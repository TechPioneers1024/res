function getLang() {
    const params = new URLSearchParams(window.location.search);
    var lang = (params.get("lang") || "en").toLowerCase();
    if (i18n[lang]) return lang;
    var base = lang.split("-")[0];
    return i18n[base] ? base : "en";
}

function render() {
    var t = i18n[getLang()];
    var stepsHtml = "";
    for (var i = 0; i < t.steps.length; i++) {
        stepsHtml += "<li>" + t.steps[i] + "</li>";
    }
    document.getElementById("content").innerHTML =
        '<h1>' + t.title + '</h1>' +
        '<div class="section">' +
            '<div class="section-title">' + t.whyTitle + '</div>' +
            '<div>' + t.whyText + '</div>' +
        '</div>' +
        '<div class="section">' +
            '<div class="section-title">' + t.howTitle + '</div>' +
            '<ol class="steps">' + stepsHtml + '</ol>' +
            '<div class="example">' + t.example + '</div>' +
        '</div>' +
        '<div class="contact">' + t.contact + '</div>';
}

render();
